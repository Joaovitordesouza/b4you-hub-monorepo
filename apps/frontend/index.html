
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B4You - Creator Prospecting Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"SF Pro Display"', '"SF Pro Text"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#f0fdf4',
                100: '#dcfce7',
                500: '#22c55e',
                600: '#16a34a',
                900: '#14532d',
              },
              // Escala Neutra Estrita
              gray: {
                50: '#FAFAFA',
                100: '#F3F4F6',
                200: '#E5E7EB',
                300: '#D1D5DB',
                400: '#9CA3AF',
                500: '#6B7280', // Texto Auxiliar
                600: '#4B5563', // Ícones
                700: '#374151', // Texto Secundário
                800: '#1F2937',
                900: '#111827', // Texto Primário
              }
            },
            boxShadow: {
              'card': '0 1px 2px rgba(0,0,0,0.04), 0 4px 8px rgba(0,0,0,0.06)',
              'card-hover': '0 2px 6px rgba(0,0,0,0.06), 0 8px 16px rgba(0,0,0,0.08)',
              'input-focus': '0 0 0 2px rgba(203,213,225,0.6)',
              'glow': '0 0 15px rgba(34, 197, 94, 0.2)',
              'message': '0 1px 0.5px rgba(0,0,0,0.13)',
            },
            animation: {
              'enter-message': 'enter-message 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards',
            },
            keyframes: {
              'enter-message': {
                '0%': { opacity: 0, transform: 'translateY(10px) scale(0.98)' },
                '100%': { opacity: 1, transform: 'translateY(0) scale(1)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.1/",

    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",

    "@google/genai": "https://esm.run/@google/genai",
    "firebase/app": "https://esm.sh/firebase@10.8.0/compat/app",
    "firebase/auth": "https://esm.sh/firebase@10.8.0/compat/auth",
    "firebase/firestore": "https://esm.sh/firebase@10.8.0/compat/firestore",
    "firebase/": "https://esm.sh/firebase@^12.7.0/",
    "react-dom": "https://esm.sh/react-dom@^19.2.3"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
