services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - evolution_net
    deploy:
      resources:
        limits:
          memory: 6G # Limite seguro para VM de 8GB
    logging:
        driver: "json-file"
        options:
            max-size: "10m"
            max-file: "3"

  postgres:
    image: postgres:15-alpine
    container_name: evolution_postgres
    restart: always
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-StrongPassword123!}
      POSTGRES_DB: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution_net
    logging:
        driver: "json-file"
        options:
            max-size: "10m"
            max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - evolution_net
    logging:
        driver: "json-file"
        options:
            max-size: "10m"
            max-file: "3"

volumes:
  evolution_instances:
  evolution_store:
  postgres_data:
  redis_data:

networks:
  evolution_net:
