apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-retry
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-retry
  template:
    metadata:
      labels:
        app: worker-retry
    spec:
      serviceAccountName: worker-sa
      containers:
      - name: worker
        image: southamerica-east1-docker.pkg.dev/b4youhub-483504/kiwify-repo/worker:v8-executor-fix
        command: ["node", "src/retry_worker.js"]
        env:
        - name: DB_POOL_MAX
          value: "2"
        - name: GCP_PROJECT
          value: "b4you-hub"
        - name: GCP_REGION
          value: "southamerica-east1"
        - name: WORKER_URL
          value: "https://evolution-worker-74e3ydctxq-uc.a.run.app"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        volumeMounts:
        - mountPath: /tmp
          name: tmp-volume
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
      volumes:
      - name: tmp-volume
        emptyDir:
          sizeLimit: 2Gi
